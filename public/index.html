<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI大模型 Token 余量仪表盘</title>
    <!-- 引入 Tailwind CSS 进行快速美观的样式设计 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 FontAwesome 图标库 -->
    <!-- FontAwesome 7（包含 OpenAI、Claude 等品牌图标） -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.0.0/css/all.min.css">
    <!-- 引入 Chart.js 用于数据可视化 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 自定义动画效果 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        /* 进度条动画 */
        @keyframes progressFill {
            from { width: 0%; }
        }
        .progress-fill {
            animation: progressFill 1s ease-out forwards;
        }
        /* 卡片悬停效果 */
        .platform-card {
            transition: all 0.3s ease;
        }
        .platform-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        /* 快捷添加卡片悬停效果 */
        .quick-add-card {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .quick-add-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .quick-add-card.added {
            opacity: 0.5;
            pointer-events: none;
        }
        /* 模态框动画 */
        .modal-enter {
            animation: modalIn 0.3s ease-out forwards;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 顶部导航栏 -->
    <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center">
                    <i class="fas fa-chart-line text-indigo-600 text-2xl mr-3"></i>
                    <h1 class="text-xl font-bold text-gray-900">AI Token 余量仪表盘</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="refreshAllData()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg flex items-center transition-colors">
                        <i class="fas fa-sync-alt mr-2" id="refreshIcon"></i>
                        刷新全部
                    </button>
                    <button onclick="toggleQuickAdd()" id="toggleQuickAddBtn" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg flex items-center transition-colors">
                        <i class="fas fa-plus mr-2"></i>
                        添加平台
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主要内容区域 -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- 统计概览卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-600">已添加平台</p>
                        <p class="text-2xl font-bold text-gray-900" id="totalPlatforms">0</p>
                    </div>
                    <div class="bg-blue-100 p-3 rounded-lg">
                        <i class="fas fa-server text-blue-600 text-xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-600">总额度</p>
                        <p class="text-2xl font-bold text-gray-900" id="totalQuota">-</p>
                    </div>
                    <div class="bg-green-100 p-3 rounded-lg">
                        <i class="fas fa-coins text-green-600 text-xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-600">已使用</p>
                        <p class="text-2xl font-bold text-gray-900" id="totalUsed">-</p>
                    </div>
                    <div class="bg-orange-100 p-3 rounded-lg">
                        <i class="fas fa-chart-pie text-orange-600 text-xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-600">剩余额度</p>
                        <p class="text-2xl font-bold text-gray-900" id="totalRemaining">-</p>
                    </div>
                    <div class="bg-purple-100 p-3 rounded-lg">
                        <i class="fas fa-wallet text-purple-600 text-xl"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- 快捷添加平台面板（点击"添加平台"按钮展开/收起） -->
        <div id="quickAddPanel" class="hidden mb-8">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold text-gray-900 flex items-center">
                        <i class="fas fa-th-large mr-2 text-green-600"></i>
                        点击即可添加平台
                    </h2>
                    <button onclick="toggleQuickAdd()" class="text-gray-400 hover:text-gray-600">
                        <i class="fas fa-chevron-up text-lg"></i>
                    </button>
                </div>
                <p class="text-sm text-gray-500 mb-4">点击下方卡片，一键添加到仪表盘。已添加的平台会显示为灰色。</p>
                <div id="quickAddGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3">
                    <!-- 动态生成的快捷添加卡片 -->
                </div>
            </div>
        </div>

        <!-- 平台额度卡片网格 -->
        <div class="mb-8">
            <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center">
                <i class="fas fa-credit-card mr-2 text-indigo-600"></i>
                平台额度详情
            </h2>
            <div id="platformCards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- 动态生成的平台卡片将插入这里 -->
            </div>
        </div>

        <!-- 价格查询区域 -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 mb-8">
            <div class="p-6 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-900 flex items-center">
                    <i class="fas fa-tags mr-2 text-indigo-600"></i>
                    价格查询与对比
                </h2>
                <p class="text-sm text-gray-500 mt-1">各主流大模型 API 的价格参考（每 1K tokens）</p>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">平台</th>
                            <th class="px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">模型</th>
                            <th class="px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">输入价格</th>
                            <th class="px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">输出价格</th>
                            <th class="px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">特点</th>
                            <th class="px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                        </tr>
                    </thead>
                    <tbody id="priceTableBody" class="divide-y divide-gray-200">
                        <!-- 动态生成的价格数据将插入这里 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 快速购买入口 -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100">
            <div class="p-6 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-900 flex items-center">
                    <i class="fas fa-shopping-cart mr-2 text-indigo-600"></i>
                    快速购买/充值入口
                </h2>
            </div>
            <div class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4" id="purchaseLinks">
                <!-- 动态生成的购买链接将插入这里 -->
            </div>
        </div>
    </main>

    <!-- 编辑平台额度模态框（点击卡片上的"编辑额度"按钮时弹出） -->
    <div id="editQuotaModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center">
        <div class="bg-white rounded-xl shadow-xl max-w-md w-full mx-4 modal-enter">
            <div class="p-6 border-b border-gray-200 flex justify-between items-center">
                <h3 class="text-lg font-semibold text-gray-900" id="editModalTitle">编辑额度</h3>
                <button onclick="closeEditModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <input type="hidden" id="editPlatformIndex">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">账号标识（仅用于显示）</label>
                    <input type="text" id="editApiKeyInput" placeholder="输入账号名称" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div class="border-t border-gray-200 pt-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        <i class="fas fa-key mr-1 text-yellow-500"></i>API Key（用于自动获取额度）
                    </label>
                    <input type="password" id="editApiKeySecret" placeholder="输入你的 API Key" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    <p class="text-xs text-gray-500 mt-1">API Key 仅发送到后端查询额度，不会被存储</p>
                    <button onclick="autoFetchQuota()" id="autoFetchBtn" class="mt-2 w-full bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white py-2 rounded-lg text-sm transition-all flex items-center justify-center">
                        <i class="fas fa-magic mr-2"></i>自动获取额度
                    </button>
                </div>
                <div class="border-t border-gray-200 pt-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">当前额度</label>
                    <input type="number" id="editQuotaInput" placeholder="例如: 1000000" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">已使用</label>
                    <input type="number" id="editUsedInput" placeholder="例如: 500000" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
            </div>
            <div class="p-6 border-t border-gray-200 flex justify-end space-x-3">
                <button onclick="closeEditModal()" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition-colors">取消</button>
                <button onclick="saveEdit()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors">保存</button>
            </div>
        </div>
    </div>

    <!-- 平台详情模态框 -->
    <div id="platformDetailModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center">
        <div class="bg-white rounded-xl shadow-xl max-w-2xl w-full mx-4 modal-enter">
            <div class="p-6 border-b border-gray-200 flex justify-between items-center">
                <h3 class="text-lg font-semibold text-gray-900" id="detailModalTitle">平台详情</h3>
                <button onclick="closeDetailModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="p-6" id="detailModalContent">
                <!-- 动态内容 -->
            </div>
        </div>
    </div>

        // ===== 后端服务配置 =====
        // 前后端部署在同一服务器，使用相对路径（同源，无跨域问题）
        const BACKEND_URL = '';

        // ===== 核心功能函数 =====

        /**
         * 渲染快捷添加面板
         * 展示所有可选平台的小卡片，点击即可一键添加
         */
        function renderQuickAddPanel() {
            const grid = document.getElementById('quickAddGrid');
            grid.innerHTML = '';

            // 获取已添加的平台类型列表，用于标记已添加状态
            const addedTypes = new Set(platforms.map(p => p.type));

            Object.keys(platformConfigs).forEach(key => {
                const config = platformConfigs[key];
                const isAdded = addedTypes.has(key);

                const card = document.createElement('div');
                card.className = `quick-add-card border-2 rounded-lg p-3 text-center ${isAdded ? 'added border-gray-200 bg-gray-50' : 'border-dashed border-gray-300 hover:border-green-400 bg-white'}`;
                const iconHtml = config.iconType === 'image'
                    ? `<img src="${config.icon}" alt="${config.name}" class="w-7 h-7 object-contain">`
                    : `<i class="${config.icon}"></i>`;
                card.innerHTML = `
                    <div class="${config.color} text-white w-12 h-12 rounded-xl flex items-center justify-center mx-auto mb-2 shadow-sm">
                        ${iconHtml}
                    </div>
                    <p class="text-sm font-medium text-gray-900 truncate">${config.name}</p>
                    ${isAdded ? '<p class="text-xs text-gray-400 mt-1"><i class="fas fa-check mr-1"></i>已添加</p>' : '<p class="text-xs text-green-600 mt-1">点击添加</p>'}
                `;

                if (!isAdded) {
                    card.onclick = () => quickAddPlatform(key);
                }

                grid.appendChild(card);
            });
        }

        /**
         * 一键添加平台（快捷添加面板使用）
         * 只需点击一次即可添加，无需填写任何表单
         */
        function quickAddPlatform(type) {
            const config = platformConfigs[type];
            const newPlatform = {
                type: type,
                apiKey: config.name,
                quota: 0,
                used: 0,
                addedAt: new Date().toISOString()
            };

            platforms.push(newPlatform);
            localStorage.setItem('aiPlatforms', JSON.stringify(platforms));

            // 刷新界面
            renderQuickAddPanel();
            renderPlatformCards();
        }

        /**
         * 切换快捷添加面板的显示/隐藏
         */
        function toggleQuickAdd() {
            const panel = document.getElementById('quickAddPanel');
            panel.classList.toggle('hidden');
        }

        /**
         * 渲染平台额度卡片
         * 根据用户添加的平台数据，生成可视化的额度展示卡片
         */
        function renderPlatformCards() {
            const container = document.getElementById('platformCards');
            container.innerHTML = '';

            if (platforms.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-12 bg-white rounded-xl border-2 border-dashed border-gray-300">
                        <i class="fas fa-plus-circle text-4xl text-gray-400 mb-4"></i>
                        <p class="text-gray-500 text-lg">还没有添加任何平台</p>
                        <p class="text-gray-400 text-sm mt-2">点击上方"添加平台"按钮，选择你要监控的平台</p>
                    </div>
                `;
                updateSummary();
                return;
            }

            platforms.forEach((platform, index) => {
                const config = platformConfigs[platform.type] || { name: '未知平台', icon: 'fas fa-question', color: 'bg-gray-500', textColor: 'text-gray-600', bgColor: 'bg-gray-50', queryUrl: '#', purchaseUrl: '#' };
                const total = platform.quota || 0;
                const used = platform.used || 0;
                const remaining = total - used;
                const percentage = total > 0 ? (used / total * 100).toFixed(1) : 0;
                
                // 根据使用率确定颜色状态
                let statusColor = 'bg-green-500';
                let statusText = '正常';
                if (percentage > 80) {
                    statusColor = 'bg-red-500';
                    statusText = '即将用完';
                } else if (percentage > 50) {
                    statusColor = 'bg-yellow-500';
                    statusText = '注意';
                }

                const card = document.createElement('div');
                card.className = 'platform-card bg-white rounded-xl shadow-sm border border-gray-100 p-6 fade-in';
                card.style.animationDelay = `${index * 0.1}s`;
                const iconHtml2 = config.iconType === 'image'
                    ? `<img src="${config.icon}" alt="${config.name}" class="w-8 h-8 object-contain">`
                    : `<i class="${config.icon} text-xl"></i>`;
                card.innerHTML = `
                    <div class="flex items-start justify-between mb-4">
                        <div class="flex items-center">
                            <div class="${config.color} text-white p-2.5 rounded-xl mr-3 shadow-sm">
                                ${iconHtml2}
                            </div>
                            <div>
                                <h3 class="font-semibold text-gray-900">${config.name}</h3>
                                <p class="text-xs text-gray-500">${platform.apiKey || '未命名账号'}</p>
                            </div>
                        </div>
                        <div class="flex items-center space-x-2">
                            <span class="px-2 py-1 rounded-full text-xs font-medium ${statusColor} text-white">${statusText}</span>
                            <button onclick="removePlatform(${index})" class="text-gray-400 hover:text-red-500 transition-colors" title="删除">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="space-y-3">
                        <div>
                            <div class="flex justify-between text-sm mb-1">
                                <span class="text-gray-600">使用率</span>
                                <span class="font-medium ${config.textColor}">${percentage}%</span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-2">
                                <div class="${config.color} h-2 rounded-full progress-fill" style="width: ${percentage}%"></div>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-3 gap-4 text-center">
                            <div class="${config.bgColor} rounded-lg p-2">
                                <p class="text-xs text-gray-500">总额度</p>
                                <p class="font-semibold ${config.textColor}">${formatNumber(total)}</p>
                            </div>
                            <div class="bg-orange-50 rounded-lg p-2">
                                <p class="text-xs text-gray-500">已使用</p>
                                <p class="font-semibold text-orange-600">${formatNumber(used)}</p>
                            </div>
                            <div class="bg-green-50 rounded-lg p-2">
                                <p class="text-xs text-gray-500">剩余</p>
                                <p class="font-semibold text-green-600">${formatNumber(remaining)}</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-4 flex space-x-2">
                        <button onclick="openEditModal(${index})" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-2 rounded-lg text-sm transition-colors">
                            <i class="fas fa-edit mr-1"></i> 编辑额度
                        </button>
                        <button onclick="window.open('${config.queryUrl}', '_blank')" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-2 rounded-lg text-sm transition-colors">
                            <i class="fas fa-external-link-alt mr-1"></i> 官网查询
                        </button>
                        <button onclick="window.open('${config.purchaseUrl}', '_blank')" class="flex-1 ${config.color} hover:opacity-90 text-white py-2 rounded-lg text-sm transition-colors">
                            <i class="fas fa-shopping-cart mr-1"></i> 充值
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });

            updateSummary();
        }

                        <td class="px-6 py-4 whitespace-nowrap text-sm">
                            <button onclick="window.open('${config.purchaseUrl}', '_blank')" class="text-indigo-600 hover:text-indigo-900 font-medium">
                                购买 <i class="fas fa-arrow-right text-xs"></i>
                            </button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            });
        }

        /**
         * 渲染快速购买入口
         */
        function renderPurchaseLinks() {
            const container = document.getElementById('purchaseLinks');
            container.innerHTML = '';

            Object.keys(platformConfigs).forEach(key => {
                const config = platformConfigs[key];
                const link = document.createElement('a');
                link.href = config.purchaseUrl;
                link.target = '_blank';
                link.className = 'flex items-center p-4 border border-gray-200 rounded-lg hover:border-indigo-300 hover:shadow-md transition-all group';
                const iconHtml4 = config.iconType === 'image'
                    ? `<img src="${config.icon}" alt="${config.name}" class="w-6 h-6 object-contain">`
                    : `<i class="${config.icon}"></i>`;
                link.innerHTML = `
                    <div class="${config.color} text-white p-2 rounded-xl mr-3 group-hover:scale-110 transition-transform shadow-sm">
                        ${iconHtml4}
                    </div>
                    <div class="flex-1">
                        <h4 class="font-medium text-gray-900">${config.name}</h4>
                        <p class="text-xs text-gray-500">${config.description}</p>
                    </div>
                    <i class="fas fa-external-link-alt text-gray-400 group-hover:text-indigo-600 transition-colors"></i>
                `;
                container.appendChild(link);
            });
        }

        /**
         * 更新顶部统计摘要
         */
        function updateSummary() {
            document.getElementById('totalPlatforms').textContent = platforms.length;
            
            let totalQuota = 0;
            let totalUsed = 0;
            
            platforms.forEach(p => {
                totalQuota += p.quota || 0;
                totalUsed += p.used || 0;
            });
            
            document.getElementById('totalQuota').textContent = formatNumber(totalQuota);
            document.getElementById('totalUsed').textContent = formatNumber(totalUsed);
            document.getElementById('totalRemaining').textContent = formatNumber(totalQuota - totalUsed);
        }

        /**
         * 格式化数字显示（添加千分位分隔符，保留2位小数）
         */
        function formatNumber(num) {
            if (num === 0 || num === undefined || num === null) return '-';
            return num.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // ===== 编辑模态框控制 =====

        /**
         * 打开编辑模态框，填入当前平台的数据
         */
        function openEditModal(index) {
            const platform = platforms[index];
            const config = platformConfigs[platform.type] || { name: '未知平台' };

            document.getElementById('editPlatformIndex').value = index;
            document.getElementById('editModalTitle').textContent = `编辑额度 - ${config.name}`;
            document.getElementById('editApiKeyInput').value = platform.apiKey || '';
            document.getElementById('editApiKeySecret').value = platform.apiKeySecret || '';
            document.getElementById('editQuotaInput').value = platform.quota || '';
            document.getElementById('editUsedInput').value = platform.used || '';

            document.getElementById('editQuotaModal').classList.remove('hidden');
        }

        /**
         * 自动从后端获取额度信息
         * 用户输入 API Key 后，调用后端代理服务查询真实额度
         */
        async function autoFetchQuota() {
            const index = parseInt(document.getElementById('editPlatformIndex').value);
            const platform = platforms[index];
            const apiKey = document.getElementById('editApiKeySecret').value.trim();

            if (!apiKey) {
                alert('请先输入 API Key');
                return;
            }

            const btn = document.getElementById('autoFetchBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>正在获取...';
            btn.disabled = true;

            try {
                const response = await fetch(`${BACKEND_URL}/api/${platform.type}/quota`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apiKey })
                });

                const data = await response.json();

                if (!data.success) {
                    // API 调用失败（如 Key 无效、网络错误等）
                    let errMsg = '获取额度失败: ' + (data.error || data.detail || '未知错误');
                    if (data.note) errMsg += '\n\n' + data.note;
                    alert(errMsg);
                } else if (data.total > 0) {
                    // 成功获取到额度数据，自动填充表单
                    document.getElementById('editQuotaInput').value = data.total;
                    document.getElementById('editUsedInput').value = data.used;
                    let msg = `额度获取成功！\n总额度: ${formatNumber(data.total)}\n已使用: ${formatNumber(data.used)}\n剩余: ${formatNumber(data.remaining)}`;
                    if (data.note) msg += '\n\n提示: ' + data.note;
                    alert(msg);
                } else if (data.note) {
                    // 响应成功但无额度数据（如平台暂不支持 API 查询）
                    alert(data.note + '\n\n请手动输入额度，或点击"官网查询"前往控制台查看。');
                } else {
                    // 兜底：响应成功但无额度数据也无提示信息
                    alert('该平台暂不支持 API 额度查询，请手动输入额度。');
                }
            } catch (error) {
                console.error('获取额度失败:', error);
                // 详细诊断错误原因
                let errorMsg = '连接后端服务失败。\n\n';
                if (window.location.protocol === 'https:' && BACKEND_URL.startsWith('http:')) {
                    errorMsg += '【原因】当前页面是 https，但后端是 http。\n';
                    errorMsg += '浏览器安全策略阻止了混合内容请求。\n\n';
                    errorMsg += '【解决方案】\n';
                    errorMsg += '1. 用 http 打开本页面（推荐）\n';
                    errorMsg += '2. 或给后端配置 HTTPS\n\n';
                } else if (error.name === 'TypeError' && error.message.includes('fetch')) {
                    errorMsg += '【原因】网络请求被拦截，可能是 CORS 或防火墙问题。\n\n';
                    errorMsg += '【解决方案】\n';
                    errorMsg += '1. 确认后端服务已启动\n';
                    errorMsg += '2. 检查服务器防火墙是否开放端口\n';
                    errorMsg += '3. 尝试直接用浏览器访问:\n   ' + BACKEND_URL + '/health\n\n';
                } else {
                    errorMsg += '错误信息: ' + error.message + '\n\n';
                }
                errorMsg += '当前配置: ' + BACKEND_URL;
                alert(errorMsg);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function closeEditModal() {
            document.getElementById('editQuotaModal').classList.add('hidden');
            // 清空 API Key 输入（安全考虑）
            document.getElementById('editApiKeySecret').value = '';
        }

        /**
         * 保存编辑后的额度数据
         */
        function saveEdit() {
            const index = parseInt(document.getElementById('editPlatformIndex').value);
            const apiKey = document.getElementById('editApiKeyInput').value;
            const apiKeySecret = document.getElementById('editApiKeySecret').value;
            const quota = parseInt(document.getElementById('editQuotaInput').value) || 0;
            const used = parseInt(document.getElementById('editUsedInput').value) || 0;

            platforms[index].apiKey = apiKey || '未命名账号';
            platforms[index].apiKeySecret = apiKeySecret || '';
            platforms[index].quota = quota;
            platforms[index].used = used;

            localStorage.setItem('aiPlatforms', JSON.stringify(platforms));
            renderPlatformCards();
            closeEditModal();
        }

        function closeDetailModal() {
            document.getElementById('platformDetailModal').classList.add('hidden');
        }

        /**
         * 删除平台
         */
        function removePlatform(index) {
            if (confirm('确定要删除这个平台吗？')) {
                platforms.splice(index, 1);
                localStorage.setItem('aiPlatforms', JSON.stringify(platforms));
                renderQuickAddPanel();
                renderPlatformCards();
            }
        }

        /**
         * 刷新所有数据
         * 如果平台保存了 API Key，会自动调用后端获取最新额度
         */
        async function refreshAllData() {
            const icon = document.getElementById('refreshIcon');
            icon.classList.add('fa-spin');

            // 找出有 API Key 的平台
            const platformsWithKey = platforms.map((p, idx) => ({ ...p, index: idx })).filter(p => p.apiKeySecret);

            if (platformsWithKey.length === 0) {
                icon.classList.remove('fa-spin');
                alert('没有保存 API Key 的平台。\n\n请在平台卡片上点击"编辑额度"，输入 API Key 后点击"自动获取额度"来保存。');
                return;
            }

            let successCount = 0;
            let failCount = 0;

            for (const platform of platformsWithKey) {
                try {
                    const response = await fetch(`${BACKEND_URL}/api/${platform.type}/quota`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ apiKey: platform.apiKeySecret })
                    });

                    const data = await response.json();

                    if (data.success && data.total > 0) {
                        platforms[platform.index].quota = data.total;
                        platforms[platform.index].used = data.used;
                        successCount++;
                    } else if (data.success && data.note) {
                        // 平台不支持API查询，不算失败（比如 Anthropic、Gemini 等）
                        successCount++;
                    } else {
                        failCount++;
                    }
                } catch (error) {
                    console.error(`刷新 ${platform.type} 失败:`, error);
                    failCount++;
                }
            }

            localStorage.setItem('aiPlatforms', JSON.stringify(platforms));
            renderPlatformCards();
            icon.classList.remove('fa-spin');

            if (failCount === 0) {
                alert(`刷新完成！成功更新 ${successCount} 个平台的额度。`);
            } else {
                alert(`刷新完成！\n成功: ${successCount} 个平台\n失败: ${failCount} 个平台\n\n失败的平台可能暂不支持 API 查询，请手动更新。`);
            }
        }

        // ===== 初始化 =====

        // 页面加载时渲染所有内容，并自动刷新有 API Key 的平台额度
        document.addEventListener('DOMContentLoaded', function() {
            renderQuickAddPanel();
            renderPlatformCards();
            renderPriceTable();
            renderPurchaseLinks();

            // 自动刷新：页面加载后，自动调用后端获取已保存 API Key 的平台额度
            // 延迟 1 秒执行，确保页面先渲染完成，给用户视觉反馈
            const platformsWithKey = platforms.filter(p => p.apiKeySecret);
            if (platformsWithKey.length > 0) {
                setTimeout(() => {
                    autoRefreshAllQuota();
                }, 1000);
            }
        });

        /**
         * 静默自动刷新所有已保存 API Key 的平台额度
         * 与手动刷新不同，这个函数不会弹出 alert，只在后台更新数据
         */
        async function autoRefreshAllQuota() {
            const platformsWithKey = platforms.map((p, idx) => ({ ...p, index: idx })).filter(p => p.apiKeySecret);
            if (platformsWithKey.length === 0) return;

            let updatedCount = 0;

            for (const platform of platformsWithKey) {
                try {
                    const response = await fetch(`${BACKEND_URL}/api/${platform.type}/quota`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ apiKey: platform.apiKeySecret })
                    });

                    const data = await response.json();

                    if (data.success && data.total > 0) {
                        platforms[platform.index].quota = data.total;
                        platforms[platform.index].used = data.used;
                        updatedCount++;
                    }
                } catch (error) {
                    // 静默忽略错误，不打扰用户
                    console.error(`自动刷新 ${platform.type} 失败:`, error);
                }
            }

            if (updatedCount > 0) {
                localStorage.setItem('aiPlatforms', JSON.stringify(platforms));
                renderPlatformCards();
                renderQuickAddPanel();
                console.log(`自动刷新完成，更新了 ${updatedCount} 个平台的额度`);
            }
        }

        // 点击模态框外部关闭
        document.getElementById('editQuotaModal').addEventListener('click', function(e) {
            if (e.target === this) closeEditModal();
        });
        document.getElementById('platformDetailModal').addEventListener('click', function(e) {
            if (e.target === this) closeDetailModal();
        });
    </script>
</body>
</html>
